name: farmer_app
description: "A new Flutter project for Web and Mobile."
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.0
  path_provider: ^2.1.0
  connectivity_plus: ^6.0.0
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  url_launcher: ^6.3.2
  dropdown_search: ^6.0.1
  # زیادکردنی Hive بۆ داتابەیس کە لەگەڵ وێب دەگونجێت
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  # زیادکردنی ئەمانە بۆ دروستکردنی کۆدی Hive
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  flutter_lints: ^6.0.0
  analyzer: '6.4.1'

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#144D45"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/app_icons.png