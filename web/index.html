<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <title>فەلاحی زیرەک</title>
  <link rel="manifest" href="manifest.json">

  <link rel="preload" href="assets/fonts/Vazirmatn-Regular.ttf" as="font" type="font/ttf" crossorigin>
  <style>
    @font-face {
      font-family: 'KurdishFont';
      src: url('assets/fonts/Vazirmatn-Regular.ttf') format('truetype');
      font-display: swap;
    }
    body { background-color: #144D45; margin: 0; }
  </style>
</head>

<body>
  <div id="loading-indicator">
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">
      <img src="icons/icons-192.png" style="width: 120px; margin-bottom: 20px;">
      <div style="color: white; font-family: sans-serif; font-weight: bold;">چاوەڕوان بە...</div>
    </div>
  </div>

  <script src="flutter.js" defer></script>
  
  <script>
    window.addEventListener('load', function(ev) {
      // لێرەدا تەنها ڕێگە دەدەین فلاتەر بە ئاسایی لۆد بێت
      _flutter.loader.loadEntrypoint({
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
